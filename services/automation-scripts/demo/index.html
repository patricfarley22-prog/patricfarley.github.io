<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receipt Tracker Demo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        header h1 { font-size: 28px; margin-bottom: 5px; }
        header p { opacity: 0.9; font-size: 14px; }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .summary-cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }
        .summary-card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .summary-card .icon { font-size: 24px; margin-bottom: 5px; }
        .summary-card .amount { font-size: 20px; font-weight: bold; color: #667eea; }
        .summary-card .label { font-size: 12px; color: #666; }
        
        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .upload-area:hover { background: #f8f9ff; }
        .upload-area .icon { font-size: 48px; margin-bottom: 10px; }
        .upload-area p { color: #666; font-size: 14px; }
        .upload-area input { display: none; }
        
        .receipt-detail {
            display: none;
            margin-top: 20px;
            background: #f8f9ff;
            border-radius: 12px;
            border: 1px solid #e0e7ff;
            overflow: hidden;
        }
        .receipt-detail.show { display: block; }
        
        .receipt-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
        }
        .receipt-header h3 { font-size: 18px; margin-bottom: 4px; }
        .receipt-header .receipt-meta { font-size: 13px; opacity: 0.9; }
        
        .receipt-body {
            padding: 20px;
        }
        
        .items-list {
            margin-bottom: 15px;
        }
        .item-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px dashed #ddd;
            font-size: 14px;
        }
        .item-row:last-child { border-bottom: none; }
        .item-name { color: #333; flex: 1; }
        .item-price { color: #667eea; font-weight: 600; font-family: 'SF Mono', monospace; }
        
        .receipt-footer {
            border-top: 2px solid #667eea;
            padding-top: 15px;
            margin-top: 15px;
        }
        .total-row {
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: bold;
        }
        .total-label { color: #666; }
        .total-amount { color: #e74c3c; font-family: 'SF Mono', monospace; }
        
        .category-tag {
            display: inline-block;
            background: #e0e7ff;
            color: #667eea;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 10px;
        }
        
        .receipts-list { margin-top: 20px; }
        .receipts-list h3 { margin-bottom: 15px; color: #333; font-size: 16px; }
        
        .receipt-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }
        .receipt-item .store-info { flex: 1; }
        .receipt-item .store-name { font-weight: bold; color: #333; font-size: 15px; }
        .receipt-item .store-meta { font-size: 12px; color: #888; margin-top: 3px; }
        .receipt-item .store-amount { 
            color: #e74c3c; 
            font-weight: bold; 
            font-size: 16px;
            font-family: 'SF Mono', monospace;
        }
        
        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
        .btn:hover { opacity: 0.9; }
        
        .demo-badge {
            position: fixed;
            top: 10px;
            right: 10px;
            background: #ff6b6b;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        
        @media (max-width: 480px) {
            .container { padding: 10px; }
            header h1 { font-size: 24px; }
            .receipt-header h3 { font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="demo-badge">DEMO</div>
    
    <div class="container">
        <header>
            <h1>🧾 Receipt Tracker</h1>
            <p>Snap. Extract. Done.</p>
        </header>
        
        <div class="summary-cards">
            <div class="summary-card">
                <div class="icon">📸</div>
                <div class="amount" id="total-receipts">0</div>
                <div class="label">Receipts</div>
            </div>
            <div class="summary-card">
                <div class="icon">💰</div>
                <div class="amount" id="total-spent">$0</div>
                <div class="label">Tracked</div>
            </div>
        </div>
        
        <div class="card">
            <div class="upload-area" onclick="document.getElementById('file-input').click()">
                <div class="icon">📷</div>
                <p>Tap to take photo or upload receipt</p>
                <p style="font-size: 12px; color: #999; margin-top: 10px;">AI extracts store, items & prices automatically</p>
                <input type="file" id="file-input" accept="image/*" capture="environment" onchange="processReceipt(event)">
            </div>
            
            <div class="receipt-detail" id="receipt-detail">
                <div class="receipt-header">
                    <h3 id="detail-store">Store Name</h3>
                    <div class="receipt-meta">
                        <span id="detail-date">April 19, 2026</span> • 
                        <span id="detail-time">10:01 AM</span>
                    </div>
                </div>
                <div class="receipt-body">
                    <div class="items-list" id="items-list">
                        <!-- Items populated by JS -->
                    </div>
                    <div class="receipt-footer">
                        <div class="total-row">
                            <span class="total-label">TOTAL</span>
                            <span class="total-amount" id="detail-total">$0.00</span>
                        </div>
                        <span class="category-tag" id="detail-category">Category</span>
                    </div>
                </div>
            </div>
            
            <div class="receipts-list" id="receipts-list" style="display: none;">
                <h3>📋 Recent Receipts</h3>
                <div id="receipts-container"></div>
            </div>
        </div>
        
        <button class="btn" onclick="resetDemo()">🔄 Reset Demo</button>
        
    </div>
    
    <script>
        // Realistic receipt data matching actual receipts
        const sampleReceipts = [
            {
                store: 'Walmart Auto',
                date: 'April 19, 2026',
                time: '10:01 AM',
                category: 'Auto',
                items: [
                    { name: 'Motor Oil 5W-30 (5qt)', price: 24.97 },
                    { name: 'Oil Filter', price: 7.99 },
                    { name: 'Wiper Blades (2pk)', price: 18.99 },
                    { name: 'Air Freshener', price: 3.49 },
                    { name: 'Tax', price: 7.81 }
                ],
                total: 77.25
            },
            {
                store: 'WinCo Foods',
                date: 'April 19, 2026',
                time: '1:22 PM',
                category: 'Groceries',
                items: [
                    { name: 'Ground Beef (2lb)', price: 12.98 },
                    { name: 'Chicken Breast (3lb)', price: 15.47 },
                    { name: 'Fresh Vegetables Mix', price: 8.99 },
                    { name: 'Rice (10lb bag)', price: 9.49 },
                    { name: 'Pasta Sauce (2 jars)', price: 5.98 },
                    { name: 'Bread & Bakery', price: 6.49 },
                    { name: 'Milk (1 gal)', price: 3.79 },
                    { name: 'Eggs (18ct)', price: 5.99 },
                    { name: 'Cheese Block', price: 4.49 },
                    { name: 'Tax', price: 11.09 }
                ],
                total: 121.77
            },
            {
                store: 'QuickTrip Gas',
                date: 'April 19, 2026',
                time: '6:16 PM',
                category: 'Gas',
                items: [
                    { name: 'Gasoline Regular (15.2 gal)', price: 45.62 },
                    { name: 'Energy Drink', price: 2.99 },
                    { name: 'Tax', price: 3.01 }
                ],
                total: 51.62
            },
            {
                store: 'Walmart',
                date: 'April 19, 2026',
                time: '8:37 PM',
                category: 'Mixed',
                items: [
                    { name: 'Toilet Paper (12 rolls)', price: 12.97 },
                    { name: 'Laundry Detergent', price: 11.94 },
                    { name: 'Shampoo & Conditioner', price: 8.97 },
                    { name: 'Toothpaste (3pk)', price: 6.47 },
                    { name: 'Frozen Pizza (2)', price: 9.98 },
                    { name: 'Frozen Vegetables', price: 4.97 },
                    { name: 'Cereal', price: 4.49 },
                    { name: 'Snacks & Chips', price: 8.99 },
                    { name: 'Soda (12pk)', price: 7.49 },
                    { name: 'Bananas (2lb)', price: 1.98 },
                    { name: 'Tax', price: 12.85 }
                ],
                total: 90.14
            }
        ];
        
        let receiptCount = 0;
        let totalSpent = 0;
        let processedReceipts = [];
        
        function processReceipt(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            // Simulate processing delay
            const uploadArea = document.querySelector('.upload-area');
            uploadArea.innerHTML = '<div style="padding: 20px;"><div style="font-size: 32px; margin-bottom: 10px;">⚙️</div><p>Reading receipt with AI...</p><p style="font-size: 12px; color: #999; margin-top: 10px;">Extracting store, items & prices</p></div>';
            
            setTimeout(() => {
                // Pick sample receipt (cycle through them)
                const receipt = sampleReceipts[receiptCount % sampleReceipts.length];
                receiptCount++;
                totalSpent += receipt.total;
                processedReceipts.unshift(receipt);
                
                // Update counters
                document.getElementById('total-receipts').textContent = receiptCount;
                document.getElementById('total-spent').textContent = '$' + totalSpent.toFixed(2);
                
                // Show detailed receipt
                showReceiptDetail(receipt);
                
                // Add to list
                updateReceiptsList();
                
                // Reset upload area
                uploadArea.innerHTML = `
                    <div class="icon">✅</div>
                    <p style="font-weight: 600; color: #667eea;">Receipt processed!</p>
                    <p style="font-size: 12px; color: #999; margin-top: 10px;">Tap to add another receipt</p>
                    <input type="file" id="file-input" accept="image/*" capture="environment" onchange="processReceipt(event)">
                `;
                
            }, 2000);
        }
        
        function showReceiptDetail(receipt) {
            // Header
            document.getElementById('detail-store').textContent = receipt.store;
            document.getElementById('detail-date').textContent = receipt.date;
            document.getElementById('detail-time').textContent = receipt.time;
            
            // Items
            const itemsList = document.getElementById('items-list');
            itemsList.innerHTML = receipt.items.map(item => `
                <div class="item-row">
                    <span class="item-name">${item.name}</span>
                    <span class="item-price">$${item.price.toFixed(2)}</span>
                </div>
            `).join('');
            
            // Footer
            document.getElementById('detail-total').textContent = '$' + receipt.total.toFixed(2);
            document.getElementById('detail-category').textContent = receipt.category;
            
            // Show detail
            document.getElementById('receipt-detail').classList.add('show');
        }
        
        function updateReceiptsList() {
            const container = document.getElementById('receipts-container');
            const list = document.getElementById('receipts-list');
            
            container.innerHTML = processedReceipts.slice(0, 5).map((receipt, index) => `
                <div class="receipt-item">
                    <div class="store-info">
                        <div class="store-name">${receipt.store}</div>
                        <div class="store-meta">${receipt.date} • ${receipt.time} • ${receipt.items.length} items</div>
                    </div>
                    <div class="store-amount">-$${receipt.total.toFixed(2)}</div>
                </div>
            `).join('');
            
            list.style.display = 'block';
        }
        
        function resetDemo() {
            receiptCount = 0;
            totalSpent = 0;
            processedReceipts = [];
            document.getElementById('total-receipts').textContent = '0';
            document.getElementById('total-spent').textContent = '$0';
            document.getElementById('receipt-detail').classList.remove('show');
            document.getElementById('receipts-container').innerHTML = '';
            document.getElementById('receipts-list').style.display = 'none';
            
            const uploadArea = document.querySelector('.upload-area');
            uploadArea.innerHTML = `
                <div class="icon">📷</div>
                <p>Tap to take photo or upload receipt</p>
                <p style="font-size: 12px; color: #999; margin-top: 10px;">AI extracts store, items & prices automatically</p>
                <input type="file" id="file-input" accept="image/*" capture="environment" onchange="processReceipt(event)">
            `;
        }
    </script>
</body>
</html>
